<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FFA Shipment Launcher · Flexport</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #0D1F3C;
      --navy-hover:  #162d56;
      --blue:        #1558D6;
      --blue-light:  #EBF1FD;
      --orange:      #F05A28;
      --orange-light:#FEF0EB;
      --orange-hover:#D44B1E;
      --bg:          #F0F3F8;
      --white:       #FFFFFF;
      --border:      #DDE3EE;
      --text:        #1C2B4A;
      --muted:       #6B7A99;
      --faint:       #A8B4CC;
      --success:     #0D7A4E;
      --error:       #C0392B;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ════════════ TOP HEADER BAR ════════════ */
    .top-bar {
      background: var(--navy);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .fp-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    /* Flexport diamond icon */
    .fp-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .fp-wordmark {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .top-bar-right {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.04em;
    }

    /* ════════════ PAGE CONTENT ════════════ */
    .page {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 36px 16px 60px;
    }

    .card {
      background: var(--white);
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(13,31,60,0.07), 0 6px 24px rgba(13,31,60,0.06);
      width: 100%;
      max-width: 640px;
      overflow: hidden;
    }

    /* ── Card header strip ── */
    .card-header {
      background: linear-gradient(135deg, #0D1F3C 0%, #1a3460 100%);
      padding: 22px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .card-header-icon {
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .card-header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.2px;
    }
    .card-header p {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 3px;
    }

    /* ── Card body ── */
    .card-body { padding: 26px 28px; }

    /* ── Step rows ── */
    .step {
      margin-bottom: 22px;
    }

    .step-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 9px;
    }

    .step-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .step-num {
      width: 20px; height: 20px;
      background: var(--navy);
      color: #fff;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .step-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.02em;
    }
    .badge-blue   { background: var(--blue-light);   color: var(--blue);   }
    .badge-orange { background: var(--orange-light);  color: var(--orange); }

    .btn-link {
      background: none; border: none;
      font-size: 12px; color: var(--faint);
      cursor: pointer; padding: 0;
      transition: color 0.15s;
    }
    .btn-link:hover { color: var(--muted); }

    /* ── Textarea ── */
    textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13.5px;
      color: var(--text);
      resize: vertical;
      min-height: 80px; max-height: 160px;
      outline: none;
      font-family: "SF Mono", "Fira Code", monospace;
      background: #FAFBFD;
      line-height: 1.6;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(21,88,214,0.1);
      background: var(--white);
    }
    textarea::placeholder { color: var(--faint); font-family: -apple-system, sans-serif; font-size: 13px; }

    .id-counter {
      margin-top: 7px;
      font-size: 11.5px;
      color: var(--muted);
      display: flex; align-items: center; gap: 7px;
    }
    .id-counter.none { color: var(--faint); }

    .count-pill {
      background: var(--blue-light);
      color: var(--blue);
      font-weight: 700;
      font-size: 11px;
      padding: 1px 9px;
      border-radius: 20px;
    }

    /* ── Workspace grids ── */
    .ws-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .ws-btn {
      background: #F5F7FB;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.13s;
      letter-spacing: 0.01em;
    }
    .ws-btn:hover {
      background: var(--blue-light);
      border-color: #9AB8F5;
      color: var(--blue);
    }
    .ws-btn.selected-1 {
      background: var(--navy);
      border-color: var(--navy);
      color: #fff;
      font-weight: 600;
    }
    .ws-btn.selected-2 {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
      font-weight: 600;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* ── URL Preview ── */
    .url-box {
      background: #F5F7FB;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11.5px;
      color: var(--muted);
      word-break: break-all;
      line-height: 1.7;
      min-height: 38px;
      margin-bottom: 18px;
    }
    .url-box .u-base   { color: var(--faint); }
    .url-box .u-id     { color: var(--navy); font-weight: 700; }
    .url-box .u-ws1    { color: var(--blue); font-weight: 600; }
    .url-box .u-ws2    { color: var(--orange); font-weight: 600; }
    .url-box .u-more   { color: var(--faint); font-size: 11px; }

    /* ── Action button row ── */
    .action-row {
      display: flex;
      gap: 10px;
    }

    /* ── Open Button ── */
    .open-btn {
      flex: 1;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 13px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .open-btn:hover:not(:disabled) {
      background: var(--orange-hover);
      box-shadow: 0 4px 14px rgba(240,90,40,0.3);
    }
    .open-btn:disabled {
      background: #D8DDE9;
      cursor: default;
      box-shadow: none;
    }

    /* ── Copy Button ── */
    .copy-btn {
      flex: 0 0 auto;
      background: var(--white);
      color: var(--navy);
      border: 1.5px solid var(--border);
      border-radius: 7px;
      padding: 13px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      white-space: nowrap;
    }
    .copy-btn:hover:not(:disabled) {
      background: var(--blue-light);
      border-color: var(--blue);
      color: var(--blue);
    }
    .copy-btn.copied {
      background: #EAF7F0;
      border-color: #0D7A4E;
      color: #0D7A4E;
    }
    .copy-btn:disabled {
      color: #C8D0DF;
      border-color: #E8ECF4;
      cursor: default;
    }

    /* arrow icon inside button */
    .btn-arrow {
      font-size: 16px;
      line-height: 1;
    }

    /* ── Status ── */
    .status-bar {
      margin-top: 12px;
      font-size: 12px;
      color: var(--faint);
      text-align: center;
      min-height: 18px;
    }
    .status-bar.success { color: var(--success); }
    .status-bar.error   { color: var(--error);   }

    /* ── Footer ── */
    .card-footer {
      background: #F8F9FC;
      border-top: 1px solid var(--border);
      padding: 11px 28px;
      font-size: 11px;
      color: var(--faint);
      text-align: center;
    }
    .card-footer a { color: var(--blue); text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Top Navigation Bar -->
  <div class="top-bar">
    <a class="fp-logo" href="https://trade.flexport.com" target="_blank">
      <!-- Flexport diamond/arrow logo mark -->
      <svg class="fp-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 2L26 9.5V18.5L14 26L2 18.5V9.5L14 2Z" fill="#F05A28"/>
        <path d="M9 11h6.5M9 14h5M9 17h7.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="fp-wordmark">Flexport</span>
    </a>
    <span class="top-bar-right">INTERNAL TOOL · FFA</span>
  </div>

  <div class="page">
    <div class="card">

      <!-- Card Header -->
      <div class="card-header">
        <div class="card-header-icon">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <rect x="2" y="5" width="18" height="13" rx="2" stroke="white" stroke-width="1.6"/>
            <path d="M7 5V4a2 2 0 0 1 4 0v1" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M6 11h4M6 14h6" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>FFA Shipment Launcher</h1>
          <p>Batch paste IDs · select workspace &amp; tab · open in one click</p>
        </div>
      </div>

      <!-- Card Body -->
      <div class="card-body">

        <!-- Step 1 -->
        <div class="step">
          <div class="step-header">
            <div class="step-label">
              <span class="step-num">1</span>
              Shipment IDs
            </div>
            <button class="btn-link" onclick="clearAll()">Clear all</button>
          </div>
          <textarea
            id="idInput"
            placeholder="Paste one or more shipment IDs — one per line or comma-separated&#10;e.g.  3741450&#10;      3741451, 3741452"
            oninput="onIdsChange()"
            autofocus
          ></textarea>
          <div class="id-counter none" id="idCounter">
            One per line, or comma-separated
          </div>
        </div>

        <!-- Step 2 -->
        <div class="step">
          <div class="step-header">
            <div class="step-label">
              <span class="step-num">2</span>
              Workspace
              <span class="step-badge badge-blue">path</span>
            </div>
          </div>
          <div class="ws-grid" id="grid1"></div>
        </div>

        <!-- Step 3 -->
        <div class="step" style="margin-bottom:0">
          <div class="step-header">
            <div class="step-label">
              <span class="step-num">3</span>
              Tab
              <span class="step-badge badge-orange">urp_tab=</span>
            </div>
          </div>
          <div class="ws-grid" id="grid2"></div>
        </div>

        <div class="divider"></div>

        <!-- URL Preview -->
        <div style="font-size:11px; font-weight:600; color:var(--faint); letter-spacing:0.07em; text-transform:uppercase; margin-bottom:7px;">
          URL Preview
        </div>
        <div class="url-box" id="urlPreview">
          <span style="color:var(--faint)">Select workspace and/or tab to preview</span>
        </div>

        <!-- Action Buttons -->
        <div class="action-row">
          <button class="open-btn" id="openBtn" onclick="openAll()" disabled>
            <span class="btn-arrow">↗</span>
            <span id="openBtnLabel">Open</span>
          </button>
          <button class="copy-btn" id="copyBtn" onclick="copyLinks()" disabled>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <rect x="4.5" y="1" width="8" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
              <rect x="1" y="4" width="8" height="9" rx="1.5" fill="white" stroke="currentColor" stroke-width="1.4"/>
            </svg>
            <span id="copyBtnLabel">Copy Links</span>
          </button>
        </div>

        <div class="status-bar" id="statusBar"></div>
      </div>

      <!-- Footer -->
      <div class="card-footer">
        Opens tabs at <a href="https://trade.flexport.com" target="_blank">trade.flexport.com</a>
      </div>

    </div>
  </div>

<script>
  const BASE = "https://trade.flexport.com/shipments";

  const GROUP1 = [
    { label: "📦 Order",      val: "order"      },
    { label: "💬 Quote",      val: "quote"      },
    { label: "📋 Plan",       val: "plan"       },
    { label: "🗓️ Schedule",   val: "schedule"   },
    { label: "🚢 Containers", val: "containers" },
    { label: "📄 BOL",        val: "bol"        },
    { label: "🗂️ Documents",  val: "documents"  },
    { label: "✉️ Messages",   val: "messages"   },
    { label: "👤 Assignees",  val: "assignees"  },
    { label: "💰 Invoicing",  val: "invoicing"  },
  ];

  const GROUP2 = [
    { label: "📊 Summary",   val: "summary"   },
    { label: "🔧 Work",      val: "work"      },
    { label: "📦 Order",     val: "order"     },
    { label: "🗺️ Route",     val: "route"     },
    { label: "📑 SOPs",      val: "sops"      },
    { label: "🗂️ Documents", val: "documents" },
    { label: "✉️ Messages",  val: "messages"  },
    { label: "🏷️ Products",  val: "products"  },
    { label: "⚠️ Exception", val: "messages&external_msg_filter=exception" },
  ];

  let sel1 = null;
  let sel2 = null;

  function parseIds() {
    return document.getElementById("idInput").value
      .split(/[\n,]+/)
      .map(s => s.trim())
      .filter(s => /^\d+$/.test(s));
  }

  function buildUrl(id, ws1, ws2) {
    let url = `${BASE}/${id}`;
    if (ws1) url += `/${ws1}`;
    if (ws2) url += `#urp_tab=${ws2}`;
    return url;
  }

  function update() {
    const ids    = parseIds();
    const hasIds = ids.length > 0;
    const hasWs  = sel1 !== null || sel2 !== null;
    const raw    = document.getElementById("idInput").value.trim();

    // Counter
    const counter = document.getElementById("idCounter");
    if (!raw) {
      counter.className = "id-counter none";
      counter.innerHTML = "One per line, or comma-separated";
    } else if (!hasIds) {
      counter.className = "id-counter";
      counter.innerHTML = `<span style="color:var(--error)">No valid numeric IDs found</span>`;
    } else {
      counter.className = "id-counter";
      counter.innerHTML = `<span class="count-pill">${ids.length}</span>&nbsp;${ids.length === 1 ? "shipment ID" : "shipment IDs"} detected`;
    }

    // URL preview
    const preview = document.getElementById("urlPreview");
    if (!hasWs) {
      preview.innerHTML = `<span style="color:var(--faint)">Select workspace and/or tab to preview</span>`;
    } else {
      const exId = hasIds ? ids[0] : "SHIPMENT_ID";
      let html = `<span class="u-base">https://trade.flexport.com/shipments/</span><span class="u-id">${exId}</span>`;
      if (sel1) html += `<span class="u-base">/</span><span class="u-ws1">${sel1}</span>`;
      if (sel2) html += `<span class="u-base">#urp_tab=</span><span class="u-ws2">${sel2}</span>`;
      if (ids.length > 1) html += `<br><span class="u-more">+${ids.length - 1} more URL${ids.length > 2 ? "s" : ""}</span>`;
      preview.innerHTML = html;
    }

    // Buttons
    const btn       = document.getElementById("openBtn");
    const btnLabel  = document.getElementById("openBtnLabel");
    const copyBtn   = document.getElementById("copyBtn");
    const canOpen   = hasIds && hasWs;
    btn.disabled    = !canOpen;
    copyBtn.disabled = !canOpen;
    const tabLabel  = ids.length > 1 ? `${ids.length} Tabs` : "1 Tab";
    btnLabel.textContent = canOpen ? `Open ${tabLabel}` : "Open";
    if (!canOpen) {
      copyBtn.classList.remove("copied");
      document.getElementById("copyBtnLabel").textContent = "Copy Links";
    }
  }

  function onIdsChange() {
    update();
    clearStatus();
  }

  function selectWs(group, val, btn) {
    if (group === 1) {
      sel1 = sel1 === val ? null : val;
      document.querySelectorAll("#grid1 .ws-btn").forEach(b => b.classList.remove("selected-1"));
      if (sel1) btn.classList.add("selected-1");
    } else {
      sel2 = sel2 === val ? null : val;
      document.querySelectorAll("#grid2 .ws-btn").forEach(b => b.classList.remove("selected-2"));
      if (sel2) btn.classList.add("selected-2");
    }
    update();
  }

  function openAll() {
    const ids = parseIds();
    if (!ids.length || (!sel1 && !sel2)) return;
    ids.forEach(id => window.open(buildUrl(id, sel1, sel2), "_blank"));
    const dest = [sel1, sel2 ? `#urp_tab=${sel2}` : ""].filter(Boolean).join(" → ");
    setStatus(`✓ Opened ${ids.length} tab${ids.length > 1 ? "s" : ""} · ${dest}`, "success");
  }

  function copyLinks() {
    const ids = parseIds();
    if (!ids.length || (!sel1 && !sel2)) return;
    const urls = ids.map(id => buildUrl(id, sel1, sel2)).join("\n");
    navigator.clipboard.writeText(urls).then(() => {
      const btn   = document.getElementById("copyBtn");
      const label = document.getElementById("copyBtnLabel");
      btn.classList.add("copied");
      label.textContent = "Copied!";
      setStatus(`✓ ${ids.length} link${ids.length > 1 ? "s" : ""} copied to clipboard`, "success");
      setTimeout(() => {
        btn.classList.remove("copied");
        label.textContent = "Copy Links";
      }, 2500);
    }).catch(() => {
      setStatus("⚠️ Could not access clipboard — please copy from the preview above", "error");
    });
  }

  function clearAll() {
    document.getElementById("idInput").value = "";
    sel1 = sel2 = null;
    document.querySelectorAll(".ws-btn").forEach(b => b.classList.remove("selected-1", "selected-2"));
    clearStatus();
    update();
    document.getElementById("idInput").focus();
  }

  function setStatus(msg, type = "") {
    const el = document.getElementById("statusBar");
    el.textContent = msg;
    el.className = "status-bar" + (type ? ` ${type}` : "");
  }
  function clearStatus() { setStatus(""); }

  function renderGrid(groupNum, items, id) {
    const g = document.getElementById(id);
    items.forEach(ws => {
      const b = document.createElement("button");
      b.className = "ws-btn";
      b.textContent = ws.label;
      b.onclick = () => selectWs(groupNum, ws.val, b);
      g.appendChild(b);
    });
  }

  renderGrid(1, GROUP1, "grid1");
  renderGrid(2, GROUP2, "grid2");
  update();
</script>
</body>
</html>
